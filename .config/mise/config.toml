[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[settings.npm]
bun = true

[tools]
neovim = "nightly"
tree-sitter = "latest"
# "aqua:bahdotsh/wrkflw" = "latest"
# "npm:@byterover/cipher" = "latest"
#opencode = "latest"
# Linters/formatters shared by shell, lint tasks, and Neovim (conform/nvim-lint).
# Editor-only LSP servers live in conf.d/neovim.toml.
biome = "latest"
markdownlint-cli2 = "latest"
prettier = "latest"
ruff = "latest"
stylua = "latest"
vale = "latest"
"aqua:Kampfkarren/selene" = "latest"
"github:ewhauser/shuck" = "latest"
"npm:markdown-toc" = "latest"

[tools."npm:@openai/codex"]
version = "latest"
minimum_release_age = "0s"

[tools."npm:@github/copilot"]
version = "latest"
minimum_release_age = "0s"

[tasks.claude-install]
description = "Install/upgrade Claude Code via native installer"
run = "curl -fsSL https://claude.ai/install.sh | bash -s latest"

[tasks.antigravity-cli-install]
description = "Install/upgrade Antigravity CLI via native installer"
run = "rm -f ~/.local/bin/agy && curl -fsSL https://antigravity.google/cli/install.sh | bash"

[tasks.dotfiles-apply]
description = "Re-apply dotfile symlinks from [dotfiles]"
run = "mise dotfiles apply --yes"

[tasks.upgrade-all]
description = "Upgrade all tools"
run = [
  "mise outdated",
  "mise upgrade",
  "mise run claude-install",
  "mise run dotfiles-apply",
  "mise run vale-sync",
  "mise prune --yes",
]

# Sources are relative to this file's directory; on a fresh machine run the
# first apply with MISE_GLOBAL_CONFIG_FILE=<repo>/.config/mise/config.toml.
[dotfiles]
"~/.zshenv" = { source = "../../.zshenv" }
"~/.xinitrc" = { source = "../../.xinitrc" }
"~/.xprofile" = { source = "../../.xprofile" }
"~/.claude" = { source = "../claude" }
"~/.codex" = { source = "../codex" }
"~/.config/*" = { source = "../*" }
# Overrides the glob (merge is last-wins per target): home-manager also writes
# into ~/.config/systemd, so merge additively instead of symlinking the dir.
"~/.config/systemd" = { source = "../systemd", mode = "copy" }
