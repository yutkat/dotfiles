name: Lint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Update packages
        run: pacman -Syyu --noconfirm
      - name: Install packages for install repository
        run: pacman -S --noconfirm git sudo mise
      - uses: actions/checkout@v7
      - name: Configure git safe directory
        # The container user differs from the workspace owner; without this,
        # `git ls-files` in the lint task returns nothing.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install lint tools
        # The lint task only expects the tools on PATH. shuck and nixfmt are
        # static binaries from their GitHub releases (locally they come from
        # Mason once available there).
        run: |
          pacman -S --noconfirm selene
          mkdir -p /tmp/shuck-dist
          curl -fsSL https://github.com/ewhauser/shuck/releases/latest/download/shuck-cli-x86_64-unknown-linux-musl.tar.xz | tar -xJ -C /tmp/shuck-dist
          install -m 755 "$(find /tmp/shuck-dist -name shuck -type f)" /usr/local/bin/shuck
          curl -fsSL -o /usr/local/bin/nixfmt https://github.com/NixOS/nixfmt/releases/latest/download/nixfmt
          chmod +x /usr/local/bin/nixfmt
      - name: Run lint (same task as local `mise run lint`)
        # Don't auto-install the full [tools] set just to run this task; the
        # lint tools are already on PATH from the step above.
        env:
          MISE_TASK_RUN_AUTO_INSTALL: "false"
        run: |
          mise trust .config/mise/config.toml
          mise run lint

  flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check flake evaluation
        run: nix flake check --no-build
