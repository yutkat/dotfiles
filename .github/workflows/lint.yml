name: Lint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Update packages
        run: pacman -Syyu --noconfirm
      - name: Install packages for install repository
        run: pacman -S --noconfirm git sudo mise
      - uses: actions/checkout@v7
      - name: Configure git safe directory
        # The container user differs from the workspace owner; without this,
        # `git ls-files` in the lint task returns nothing.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install lint tools
        # The lint task only expects selene on PATH (locally it comes from
        # Mason); shuck and nixfmt are task-level mise tools installed below.
        run: pacman -S --noconfirm selene
      - name: Run lint (same task as local `mise run lint`)
        # Don't auto-install the full [tools] set just to run this task; only
        # install the tools declared in the task header.
        env:
          MISE_TASK_RUN_AUTO_INSTALL: "false"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mise trust .config/mise/config.toml
          mise install "github:ewhauser/shuck@latest" "github:NixOS/nixfmt@latest"
          mise run lint

  flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check flake evaluation
        run: nix flake check --no-build
