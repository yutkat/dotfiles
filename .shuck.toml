[lint]
# .zshrc and .zshenv have no .zsh extension; force the zsh dialect.
per-file-shell = { ".zshenv" = "zsh", ".config/zsh/**" = "zsh" }
# C001: variables assigned for zsh/plugins to read
# C002/C003: source paths are runtime-built; files are linted directly instead
# C005: intentional deferred expansion (zinit ice strings, bash -c scripts)
ignore = ["C001", "C002", "C003", "C005"]
# C006: variables defined by plugins or runtime-sourced files
# C092: the fzf `$(__fzfcmd)` idiom
per-file-ignores = { ".config/zsh/rc/pluginconfig/**" = [
  "C006",
  "C092",
], ".config/rofi/script/**" = [
  "C006",
] }
